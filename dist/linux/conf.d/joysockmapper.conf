# JoyShockMapper system-wide default configuration
# Place user overrides in ~/.config/JoyShockMapper/OnStartup.txt

# Virtual controller output mode (XBOX or DS4)
VIRTUAL_CONTROLLER = XBOX

# Enable automatic controller reconnection on hotplug
AUTOCONNECT = ON

# Enable automatic config loading based on focused window
AUTOLOAD = ON

# Polling rate in milliseconds (lower = less latency, 1.0 = 1000 Hz)
TICK_TIME = 4

# Gyro settings
GYRO_SMOOTH_TIME = 0.125
GYRO_CUTOFF_SPEED = 0
